name: Build Linux Packages

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: build-linux-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  APP_DIR: linux-port

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: linux-port/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm ci

      - name: Run syntax checks
        working-directory: ${{ env.APP_DIR }}
        run: npm run check

  build-appimage:
    name: AppImage (${{ matrix.arch }})
    needs: check
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runs_on: ubuntu-latest
          - arch: arm64
            runs_on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: linux-port/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 rpm

      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm ci

      - name: Build AppImage
        working-directory: ${{ env.APP_DIR }}
        run: npx electron-builder --linux AppImage --publish never --${{ matrix.arch }}

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: appimage-${{ matrix.arch }}
          path: linux-port/dist/*.AppImage
          if-no-files-found: error

  build-deb:
    name: Debian Package (${{ matrix.arch }})
    needs: check
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runs_on: ubuntu-latest
          - arch: arm64
            runs_on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: linux-port/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm

      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm ci

      - name: Build Debian package
        working-directory: ${{ env.APP_DIR }}
        run: npx electron-builder --linux deb --publish never --${{ matrix.arch }}

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: deb-package-${{ matrix.arch }}
          path: linux-port/dist/*.deb
          if-no-files-found: error

  build-arch-package:
    name: Arch Linux Package
    needs: build-appimage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download x64 AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: appimage-x64
          path: dist-input

      - name: Prepare PKGBUILD
        run: |
          APP_VERSION="$(node -p "require('./linux-port/package.json').version")"
          cp dist-input/*.AppImage packaging/arch/fuck-netease-music.AppImage
          sed "s/__APP_VERSION__/${APP_VERSION}/g" packaging/arch/PKGBUILD.in > packaging/arch/PKGBUILD

      - name: Build package in Arch container
        run: |
          docker run --rm \
            -e HOST_UID="$(id -u)" \
            -v "${PWD}:/workspace" \
            -w /workspace \
            archlinux:base-devel \
            bash -lc '
              pacman -Sy --noconfirm --needed git zstd
              useradd -m -u "$HOST_UID" builder
              su builder -c "
                cd /workspace/packaging/arch &&
                makepkg -f --nodeps --noconfirm &&
                makepkg --printsrcinfo > .SRCINFO
              "
            '

      - name: Upload Arch package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: archlinux-package
          path: |
            packaging/arch/*.pkg.tar.zst
            packaging/arch/PKGBUILD
            packaging/arch/.SRCINFO
          include-hidden-files: true
          if-no-files-found: error

  release:
    name: Publish Release
    needs:
      - build-appimage
      - build-deb
      - build-arch-package
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download x64 AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: appimage-x64
          path: release-assets/appimage-x64

      - name: Download arm64 AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: appimage-arm64
          path: release-assets/appimage-arm64

      - name: Download x64 Debian package artifact
        uses: actions/download-artifact@v4
        with:
          name: deb-package-x64
          path: release-assets/deb-x64

      - name: Download arm64 Debian package artifact
        uses: actions/download-artifact@v4
        with:
          name: deb-package-arm64
          path: release-assets/deb-arm64

      - name: Download Arch package artifact
        uses: actions/download-artifact@v4
        with:
          name: archlinux-package
          path: release-assets/archlinux

      - name: Normalize release asset names
        run: |
          mkdir -p release-assets/upload
          cp release-assets/appimage-x64/*.AppImage release-assets/upload/fuck-netease-music-x64.AppImage
          cp release-assets/appimage-arm64/*.AppImage release-assets/upload/fuck-netease-music-arm64.AppImage

      - name: Compute release metadata
        id: meta
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          SAFE_BRANCH="$(printf '%s' "${BRANCH_NAME}" | tr '/_' '-' | tr -cd '[:alnum:]-.' )"
          RELEASE_TAG="rolling-${SAFE_BRANCH}"
          RELEASE_NAME="Rolling Release (${BRANCH_NAME})"
          PREV_REF=""
          if git rev-parse "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            PREV_REF="refs/tags/${RELEASE_TAG}"
          fi

          {
            echo "release_tag=${RELEASE_TAG}"
            echo "release_name=${RELEASE_NAME}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "notes<<EOF"
            echo "Branch: ${BRANCH_NAME}"
            echo "Commit: ${GITHUB_SHA}"
            echo
            echo "Changes since previous release:"
            if [ -n "${PREV_REF}" ]; then
              git log --pretty='- %s (%h)' "${PREV_REF}..${GITHUB_SHA}"
            else
              git log --pretty='- %s (%h)' --max-count=50 "${GITHUB_SHA}"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Move rolling tag to current commit
        run: |
          TAG_NAME="${{ steps.meta.outputs.release_tag }}"
          git tag -f "${TAG_NAME}" "${GITHUB_SHA}"
          git push origin "refs/tags/${TAG_NAME}" --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: ${{ steps.meta.outputs.release_name }}
          body: ${{ steps.meta.outputs.notes }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: false
          append_body: false
          make_latest: false
          prerelease: true
          draft: false
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            release-assets/upload/fuck-netease-music-x64.AppImage
            release-assets/upload/fuck-netease-music-arm64.AppImage
            release-assets/deb-x64/*.deb
            release-assets/deb-arm64/*.deb
            release-assets/archlinux/*.pkg.tar.zst
            release-assets/archlinux/PKGBUILD
            release-assets/archlinux/.SRCINFO
